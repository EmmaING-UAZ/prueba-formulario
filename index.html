<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulario de Contacto</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Contacto</h1>
        <form name="contacto" method="POST" netlify>
            <input type="hidden" name="form-name" value="contacto" />
            <p>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required />
            </p>
            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required />
            </p>
            <p>
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
            </p>
            <p>
                <button type="submit">Enviar</button>
            </p>
            <div id="error-message" class="error-message" style="display:none;color:red;"></div>
            <div id="sending-message" class="sending-message" style="display:none;">Enviando...</div>
        </form>
    </div>

    <!-- Modal de éxito -->
    <div id="success-modal" class="modal-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;">
        <div class="modal-content" style="background:#fff;padding:20px;border-radius:8px;max-width:400px;text-align:center;">
            <h2>¡Mensaje Enviado!</h2>
            <p>Tu mensaje ha sido enviado con éxito.</p>
            <button id="close-modal-button" style="padding:8px 16px;cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
